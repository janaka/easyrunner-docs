  - How It Works: how-it-works.md
  - Install: install.md
  - Docs:
    - Overview: user-docs/index.md
    - Concepts:
      - EasyRunner in One Page: user-docs/concepts/index.md
      - Server Provisioning Paths: user-docs/concepts/server-provisioning.md
      - Apps and Services: user-docs/concepts/apps-and-services.md
      - Deploy Flows: user-docs/concepts/deploy-flows.md
      - Links and Integrations: user-docs/concepts/links-and-integrations.md
    - Quickstart:
      - Deploy Your First App: user-docs/quickstart/first-app.md
      - New Hetzner Server: user-docs/quickstart/new-hetzner-server.md
      - Existing Ubuntu Server: user-docs/quickstart/existing-ubuntu-server.md
    - Install & Setup:
      - Install the CLI: user-docs/setup/install.md
      - First-Run Setup: user-docs/setup/first-run-setup.md
      - License Setup: user-docs/setup/license.md
      - Links and Integrations: user-docs/setup/integrations.md
    - Servers:
      - Create a Hetzner Server: user-docs/servers/create-hetzner-server.md
      - Add an Existing Server: user-docs/servers/add-existing-server.md
