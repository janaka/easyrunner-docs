size: { width: 1200, height: 630 }

definitions:

  # Page title with fallback
  - &page_title >-
    {%- if layout.title -%}
      {{ layout.title }}
    {%- else -%}
      {{ page.meta.get("title", page.title) }}
    {%- endif -%}

  # Page description with fallback
  - &page_description >-
    {%- if layout.description -%}
      {{ layout.description }}
    {%- else -%}
      {{ page.meta.get("description", config.site_description) }}
    {%- endif -%}

layers:

  # Background
  - background:
      color: "#111111"

  # Site name – top left, Sarpanch Bold green
  - size: { width: 500, height: 64 }
    offset: { x: 56, y: 44 }
    typography:
      content: "EasyRunner"
      color: "#22c563"
      font:
        family: Sarpanch
        style: Bold

  # Logo – top right
  - size: { width: 130, height: 130 }
    offset: { x: 1014, y: 44 }
    background:
      image: "{{ layout.logo }}"

  # Description – large bold centrepiece
  - size: { width: 1088, height: 260 }
    offset: { x: 56, y: 130 }
    typography:
      content: *page_description
      align: start
      color: "#ffffff"
      line:
        amount: 4
        height: 1.15
      font:
        family: Roboto Mono
        style: Bold

  # Title – bottom
  - size: { width: 1088, height: 80 }
    offset: { x: 56, y: 410 }
    typography:
      content: *page_title
      align: start
      color: "#aaaaaa"
      line:
        amount: 2
        height: 1.5
      font:
        family: Roboto Mono
        style: Regular
