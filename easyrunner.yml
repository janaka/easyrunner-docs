size: { width: 1200, height: 630 }

definitions:

  # Page title with fallback
  - &page_title >-
    {%- if layout.title -%}
      {{ layout.title }}
    {%- else -%}
      {{ page.meta.get("title", page.title) }}
    {%- endif -%}

  # Page description with fallback
  - &page_description >-
    {%- if layout.description -%}
      {{ layout.description }}
    {%- else -%}
      {{ page.meta.get("description", config.site_description) }}
    {%- endif -%}

  # Page title with site name (used for og:title / twitter:title)
  - &page_title_with_site_name >-
    {%- if not page.is_homepage -%}
      {{ page.meta.get("title", page.title) }} - {{ config.site_name }}
    {%- else -%}
      {{ config.site_name }}
    {%- endif -%}

# Meta tags injected into each page's <head>. REQUIRED — a custom layout only
# emits the tags it declares here, so without this block the social plugin still
# renders the card PNG but never points X/LinkedIn/Slack at it (no og:image).
tags:

  # Open Graph (LinkedIn, Slack, Facebook, …)
  # NOTE: og:image carries a "?v=N" cache-buster. LinkedIn (and X) cache the
  # downloaded image keyed on this URL and never re-fetch it on their own — the
  # Post Inspector only re-scrapes metadata, not the image rendition. The card
  # filename is stable across deploys, so whenever the card DESIGN changes, bump
  # this version (v2 → v3 …) to force the networks to download the fresh image.
  og:type: website
  og:title: *page_title_with_site_name
  og:description: *page_description
  og:image: "{{ image.url }}?v=2"
  og:image:type: "{{ image.type }}"
  og:image:width: "{{ image.width }}"
  og:image:height: "{{ image.height }}"
  og:url: "{{ page.canonical_url }}"

  # Twitter / X (falls back to og:* when absent, but be explicit)
  twitter:card: summary_large_image
  twitter:title: *page_title_with_site_name
  twitter:description: *page_description
  twitter:image: "{{ image.url }}?v=2"

layers:

  # Background
  - background:
      color: "#111111"

  # Site name – top left, Sarpanch Bold green
  - size: { width: 500, height: 64 }
    offset: { x: 56, y: 44 }
    typography:
      content: "EasyRunner"
      color: "#22c563"
      font:
        family: Sarpanch
        style: Bold

  # Logo – top right
  - size: { width: 130, height: 130 }
    offset: { x: 1014, y: 44 }
    background:
      image: "{{ layout.logo }}"

  # Title – prominent bold heading, FIRST (top of the content area)
  - size: { width: 1088, height: 150 }
    offset: { x: 56, y: 190 }
    typography:
      content: *page_title
      align: start
      color: "#ffffff"
      line:
        amount: 2
        height: 1.2
      font:
        family: Roboto Mono
        style: Bold

  # Description – supporting text, SECOND (below the title)
  - size: { width: 1088, height: 200 }
    offset: { x: 56, y: 350 }
    typography:
      content: *page_description
      align: start
      color: "#aaaaaa"
      line:
        amount: 4
        height: 1.25
      font:
        family: Roboto Mono
        style: Regular
